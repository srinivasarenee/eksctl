# spot-cluster.yaml

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

managedNodeGroups:
- name: spot
  #instanceTypes: ["c3.large","c4.large","c5.large","c5d.large","c5n.large","c5a.large"]
  instanceTypes: ["c7i-flex.large","m7i-flex.large","t4g.small","t4g.micro","t3.micro","t3.small"]
  # AWS Free tier
  #instanceTypes: ["m7i-flex.large","c7i-flex.large","t3.small"]
  spot: true
  desiredCapacity: 2